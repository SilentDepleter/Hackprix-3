<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aurora - Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#19191e",
                        "tertiary-container": "#00eefc",
                        "primary-fixed": "#ed69ff",
                        "error-dim": "#d73357",
                        "on-primary": "#540061",
                        "tertiary-fixed": "#00eefc",
                        "outline": "#76757a",
                        "secondary": "#ac89ff",
                        "on-surface": "#f3eff6",
                        "on-tertiary-fixed-variant": "#005e64",
                        "on-background": "#f3eff6",
                        "primary": "#f382ff",
                        "on-primary-fixed-variant": "#51005d",
                        "on-surface-variant": "#acaab0",
                        "outline-variant": "#48474c",
                        "surface-dim": "#0e0e12",
                        "on-tertiary-fixed": "#003f43",
                        "surface-container-lowest": "#000000",
                        "background": "#0e0e12",
                        "surface-container-high": "#1f1f25",
                        "tertiary-dim": "#00deec",
                        "error": "#ff6e84",
                        "primary-dim": "#ec63ff",
                        "secondary-dim": "#874cff",
                        "surface-bright": "#2c2b32",
                        "surface-variant": "#25252b",
                        "surface-container-highest": "#25252b",
                        "primary-container": "#ed69ff",
                        "on-primary-fixed": "#000000",
                        "surface-tint": "#f382ff",
                        "tertiary": "#8ff5ff",
                        "surface-container-low": "#131317",
                        "surface": "#0e0e12"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body { background-color: #050508; min-height: max(884px, 100dvh); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .neon-glow-primary { text-shadow: 0 0 10px rgba(243, 130, 255, 0.5), 0 0 20px rgba(243, 130, 255, 0.3); }
        .glass-panel { background: rgba(25, 25, 30, 0.6); backdrop-filter: blur(20px); }
        .wireframe-bg {
            background-image: linear-gradient(to right, rgba(72, 71, 76, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(72, 71, 76, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            perspective: 1000px;
            transform: rotateX(60deg);
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
        }
</style>
</head>
<body class="font-body text-on-surface antialiased overflow-x-hidden selection:bg-primary selection:text-on-primary">
<div class="wireframe-bg"></div>
<div class="flex min-h-screen">
    <aside class="w-64 fixed inset-y-0 left-0 bg-[#050508]/90 backdrop-blur-xl border-r border-outline-variant/10 z-50 flex flex-col items-center py-10 shadow-[5px_0_30px_rgba(217,70,239,0.05)]">
        <h1 class="font-['Space_Grotesk'] tracking-widest uppercase text-3xl font-bold text-[#d946ef] drop-shadow-[0_0_8px_rgba(217,70,239,0.5)] mb-12">AURORA</h1>
        <nav class="flex flex-col gap-4 w-full px-6">
            <a href="index.html" class="flex items-center gap-4 text-zinc-400 hover:text-white hover:bg-white/5 rounded-xl p-4 group transition-all">
                <span class="material-symbols-outlined group-hover:text-primary group-hover:scale-110 transition-transform">home</span>
                <span class="font-medium tracking-widest uppercase text-sm">Dashboard</span>
            </a>
            <a href="analytics.html" class="flex items-center gap-4 text-zinc-400 hover:text-white hover:bg-white/5 rounded-xl p-4 group transition-all">
                <span class="material-symbols-outlined group-hover:text-tertiary group-hover:scale-110 transition-all">insights</span>
                <span class="font-medium tracking-widest uppercase text-sm">Analytics</span>
            </a>
            <a href="add_expense.html" class="flex items-center gap-4 text-zinc-400 hover:text-white hover:bg-white/5 rounded-xl p-4 group transition-all">
                <span class="material-symbols-outlined group-hover:text-primary group-hover:scale-110 transition-transform">add_circle</span>
                <span class="font-medium tracking-widest uppercase text-sm">Add Expense</span>
            </a>
            
            <a href="wallet.html" class="flex items-center gap-4 text-zinc-400 hover:text-white hover:bg-white/5 rounded-xl p-4 group transition-all">
                <span class="material-symbols-outlined group-hover:text-secondary group-hover:scale-110 transition-all">account_balance_wallet</span>
                <span class="font-medium tracking-widest uppercase text-sm">Wallet</span>
            </a>
            
            <a href="profile.html" class="flex items-center gap-4 text-on-surface bg-primary/10 border border-primary/20 shadow-[0_0_15px_rgba(243,130,255,0.15)] rounded-xl p-4 group transition-all">
                <span class="material-symbols-outlined text-primary group-hover:scale-110 transition-all">person</span>
                <span class="font-bold tracking-widest uppercase text-sm">Profile</span>
            </a>
        </nav>
        <div class="mt-auto w-full px-6 space-y-2">
            <a href="settings.html" class="w-full flex justify-center items-center gap-2 text-zinc-400 hover:text-white hover:bg-white/5 rounded-xl p-4 group transition-all">
                <span class="material-symbols-outlined group-hover:rotate-45 transition-transform duration-300">settings</span>
                <span class="font-medium tracking-widest uppercase text-sm">Settings</span>
            </a>
            <button id="logout-btn" class="w-full flex justify-center items-center gap-2 text-error-dim hover:text-error hover:bg-error/10 rounded-xl p-4 group transition-all">
                <span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform duration-300">logout</span>
                <span class="font-medium tracking-widest uppercase text-sm">Logout</span>
            </button>
        </div>
    </aside>

    <div class="flex-1 ml-64 flex flex-col min-h-0 bg-[#050508]/60">
        <header class="w-full bg-[#050508]/80 backdrop-blur-xl border-b border-[#d946ef]/10 flex justify-between items-center px-10 py-6 sticky top-0 z-40">
            <div>
                <h2 class="font-headline text-2xl text-on-surface font-semibold tracking-tighter">Profile</h2>
                <p class="font-label text-xs uppercase tracking-widest text-on-surface-variant mt-1">Your account information</p>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto w-full p-6 md:p-10 hide-scrollbar overflow-x-hidden relative">
            <div class="max-w-7xl mx-auto h-full flex flex-col items-center justify-center min-h-[60vh]">
                
                <div class="glass-panel p-10 md:p-14 rounded-3xl border border-primary/20 hover:border-primary/50 transition-colors w-full max-w-2xl relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-b from-[#d946ef]/5 to-transparent pointer-events-none"></div>
                    
                    <div class="flex flex-col md:flex-row gap-10 items-center md:items-start relative z-10 w-full">
                        <!-- Avatar Section -->
                        <div class="flex flex-col items-center gap-4">
                            <div class="w-32 h-32 rounded-full bg-surface-container-high border-2 border-primary/50 flex items-center justify-center overflow-hidden shadow-[0_0_30px_rgba(243,130,255,0.2)]">
                                <span class="material-symbols-outlined text-[5rem] text-primary">face</span>
                            </div>
                            <div class="text-center">
                                <h3 id="display-name" class="font-headline font-bold text-2xl text-on-surface truncate max-wxs">User</h3>
                                <p id="display-location" class="text-zinc-400 font-label text-sm uppercase tracking-widest mt-1 truncate max-w-xs">Location</p>
                            </div>
                        </div>

                        <!-- Form Section -->
                        <div class="flex-1 w-full space-y-6">
                            <div>
                                <label class="block text-xs uppercase tracking-widest text-zinc-500 font-bold mb-2">Display Name</label>
                                <input type="text" id="profile-name-input" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-4 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder-zinc-600 outline-none" placeholder="Enter your name">
                            </div>
                            <div>
                                <label class="block text-xs uppercase tracking-widest text-zinc-500 font-bold mb-2">University / Location</label>
                                <input type="text" id="profile-location-input" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-4 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder-zinc-600 outline-none" placeholder="Where do you study?">
                            </div>
                            <div class="pt-4 flex justify-end">
                                <button id="save-profile-btn" class="px-8 py-3 bg-primary text-black font-bold tracking-widest uppercase text-sm rounded-xl hover:scale-105 active:scale-95 transition-all shadow-[0_0_20px_rgba(243,130,255,0.3)] flex items-center gap-2">
                                    <span>Save</span>
                                    <span class="material-symbols-outlined text-lg">check_circle</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>
</body>
<script type="module" src="/src/profile.js"></script>
</html>
