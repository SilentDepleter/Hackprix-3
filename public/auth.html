<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aurora - Authenticaton</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#19191e",
                        "tertiary-container": "#00eefc",
                        "primary-fixed": "#ed69ff",
                        "error-dim": "#d73357",
                        "on-primary": "#540061",
                        "tertiary-fixed": "#00eefc",
                        "outline": "#76757a",
                        "secondary": "#ac89ff",
                        "on-surface": "#f3eff6",
                        "primary": "#f382ff",
                        "surface-dim": "#0e0e12",
                        "surface-container-lowest": "#000000",
                        "background": "#0e0e12",
                        "surface-container-high": "#1f1f25",
                        "inverse-primary": "#a300bb",
                        "tertiary-dim": "#00deec",
                        "error": "#ff6e84",
                        "secondary-dim": "#874cff",
                        "secondary-container": "#7000ff",
                        "surface-bright": "#2c2b32",
                        "surface-variant": "#25252b",
                        "secondary-fixed-dim": "#ceb9ff",
                        "surface-container-highest": "#25252b",
                        "secondary-fixed": "#dac9ff",
                        "tertiary-fixed-dim": "#00deec",
                        "surface-tint": "#f382ff",
                        "tertiary": "#8ff5ff",
                        "surface-container-low": "#131317",
                        "primary-fixed-dim": "#e451f9",
                        "surface": "#0e0e12"
                    },
                    "borderRadius": { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                    "fontFamily": { "headline": ["Space Grotesk"], "body": ["Inter"], "label": ["Inter"] }
                },
            },
        }
    </script>
    <style>
        body { background-color: #050508; }
        .glass-panel { background: rgba(25, 25, 30, 0.6); backdrop-filter: blur(20px); }
        .wireframe-bg {
            background-image: linear-gradient(to right, rgba(72, 71, 76, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(72, 71, 76, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            perspective: 1000px;
            transform: rotateX(60deg);
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
        }
    </style>
</head>
<body class="font-body text-on-surface antialiased overflow-x-hidden overflow-y-hidden selection:bg-primary selection:text-on-primary flex items-center justify-center min-h-screen">
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="wireframe-bg"></div>
    </div>
    
    <div class="relative z-10 glass-panel p-10 border border-[#d946ef]/20 rounded-3xl shadow-[0_0_60px_rgba(217,70,239,0.15)] w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <h1 class="font-['Space_Grotesk'] tracking-widest uppercase text-4xl font-bold text-[#d946ef] drop-shadow-[0_0_8px_rgba(217,70,239,0.5)] mb-2">AURORA</h1>
            <p class="text-on-surface-variant font-label text-sm uppercase tracking-widest">Expense Intelligence</p>
        </div>
        
        <form id="auth-form" class="space-y-6" autocomplete="off">
            <div id="name-field" class="hidden">
                <label class="block font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant mb-2">Name</label>
                <input type="text" id="auth-name" autocomplete="off" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl p-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="Neo">
            </div>
            <div>
                <label class="block font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant mb-2">Email</label>
                <input type="email" id="auth-email" required autocomplete="off" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl p-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="neo@matrix.com">
            </div>
            <div>
                <label class="block font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant mb-2">Password</label>
                <input type="password" id="auth-password" required autocomplete="new-password" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl p-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="••••••••">
            </div>
            <button type="submit" id="auth-submit-btn" class="w-full py-4 bg-[#d946ef] hover:bg-[#eb8eff] text-black font-bold uppercase tracking-widest rounded-xl transition-all shadow-[0_0_20px_rgba(217,70,239,0.4)] hover:shadow-[0_0_30px_rgba(217,70,239,0.6)] hover:scale-[1.02]">
                Sign In
            </button>
            <div class="text-center mt-4">
                <p class="text-sm tracking-wide text-zinc-400">
                    <span id="auth-toggle-text">Don't have an account?</span> 
                    <button type="button" id="auth-toggle-btn" class="text-primary hover:text-tertiary transition-colors ml-1 uppercase font-bold tracking-widest text-xs">Sign Up</button>
                </p>
            </div>
            
            <p id="auth-error" class="text-error text-center tracking-widest text-sm font-medium mt-4 hidden shadow-[0_0_10px_rgba(255,110,132,0.3)]"></p>
        </form>
    </div>

    <script type="module" src="/src/auth.js"></script>
</body>
</html>
